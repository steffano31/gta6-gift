<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GTA VI Gift — TikTok</title>
  <style>
    *{box-sizing:border-box} body{margin:0;background:#111;display:grid;place-items:center;font-family:Arial,Helvetica,sans-serif}
    .poster{position:relative;width:min(100vw,540px);aspect-ratio:9/16;overflow:hidden;color:#fff;background:#180d25}
    .poster:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(28,7,39,.12),rgba(14,5,27,.18) 42%,rgba(10,4,20,.97)),url('https://www.rockstargames.com/VI/_next/static/media/Official_Cover_Art_landscape.12.uu2irr.2_a.jpg?akim=1&imdensity=1&imwidth=3840') center/cover;filter:saturate(1.2)}
    .poster:after{content:"";position:absolute;inset:0;background:linear-gradient(125deg,rgba(255,86,152,.42),transparent 38%),radial-gradient(circle at 78% 17%,rgba(88,231,232,.32),transparent 30%)}
    .content{position:absolute;inset:0;z-index:1;display:flex;flex-direction:column;padding:6% 8% 7%;text-align:center}.top{font-size:clamp(.64rem,2vw,.9rem);font-weight:800;letter-spacing:.18em}.spark,.status b{color:#60edf0}.eyebrow{margin:7% 0 2%;font-size:clamp(.72rem,2.2vw,1rem);font-weight:800;letter-spacing:.13em}.title{margin:0;font-weight:900;font-size:clamp(2.8rem,10vw,5rem);line-height:.78;letter-spacing:-.1em;font-style:italic;text-shadow:4px 4px 0 #c63d78}.title span{display:block;color:#ff78ad}.sub{margin:5% auto 4%;max-width:330px;font-size:clamp(.78rem,2.3vw,1rem);font-weight:700;line-height:1.3}
    form{margin:0 auto 5%;width:min(100%,390px)}.recipient-row{display:flex;gap:7px}.recipient-row input{min-width:0;flex:1;border:1px solid rgba(255,255,255,.7);border-radius:7px;padding:10px 11px;background:rgba(10,4,20,.68);color:#fff;font-weight:700;outline:none}.recipient-row input:focus{border-color:#60edf0}button{border:0;border-radius:7px;padding:10px 12px;background:#ff78ad;color:#280d2b;font-weight:900;cursor:pointer;letter-spacing:.04em}button:hover{background:#ff9ac3}.platforms{display:flex;gap:7px;margin-top:7px}.platform{flex:1;padding:8px;background:rgba(10,4,20,.68);border:1px solid rgba(255,255,255,.48);color:#fff;font-size:clamp(.6rem,1.8vw,.75rem)}.platform.selected{background:#60edf0;color:#120d21;border-color:#60edf0}.platform[aria-pressed="true"]{box-shadow:0 0 0 2px rgba(96,237,240,.25)}
    .cover{position:relative;width:39%;max-width:180px;margin:0 auto;aspect-ratio:2/3;border:3px solid rgba(255,255,255,.78);box-shadow:0 17px 30px rgba(0,0,0,.52);overflow:hidden;background:#000}.cover img{width:100%;height:100%;object-fit:cover;object-position:58% center}
    .history{margin-top:auto;text-align:left;border-top:1px solid rgba(255,255,255,.5);padding-top:3%;min-height:0}.history-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:4px}.history h2{margin:0;font-size:clamp(.72rem,2.1vw,.92rem);letter-spacing:.08em}.history small{color:#d6cadb;font-size:clamp(.58rem,1.7vw,.72rem)}#historyList{height:clamp(78px,14vh,126px);overflow-y:auto;padding-right:7px;scroll-behavior:smooth}#historyList::-webkit-scrollbar{width:5px}#historyList::-webkit-scrollbar-track{background:rgba(255,255,255,.1)}#historyList::-webkit-scrollbar-thumb{background:#60edf0;border-radius:5px}.gift-row{display:grid;grid-template-columns:1fr auto;gap:10px;padding:7px 0;border-top:1px solid rgba(255,255,255,.16);font-size:clamp(.66rem,1.9vw,.82rem)}.gift-row span{color:#e6dbe8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.gift-row span small{display:block;margin-top:3px;color:#c6b9ca;font-size:.8em}.gift-row b{display:block;text-align:right;font-size:clamp(.56rem,1.6vw,.68rem);letter-spacing:.05em;color:#60edf0;white-space:nowrap}.gift-row b em{display:block;margin-top:3px;color:#ded4e0;font-size:.78em;font-style:normal;font-weight:500;letter-spacing:0}.flow-modal{display:none;position:absolute;z-index:4;inset:0;padding:9%;background:linear-gradient(180deg,rgba(12,5,24,.96),rgba(23,8,35,.97));text-align:center;align-items:center;justify-content:center}.flow-modal.show{display:flex}.flow-card{width:100%;max-width:360px}.flow-card h2{margin:0 0 12px;font-size:clamp(1.45rem,6vw,2rem);letter-spacing:.05em}.flow-card p{color:#e6dce9;line-height:1.45}.summary{margin:24px 0;text-align:left;border-top:1px solid rgba(255,255,255,.35);border-bottom:1px solid rgba(255,255,255,.35)}.summary div{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.15);font-size:.9rem}.summary div:last-child{border:0}.summary span{color:#cfc3d2}.summary b{word-break:break-word;text-align:right}.flow-actions{display:flex;gap:8px}.flow-actions button{flex:1}.flow-actions .secondary{background:rgba(255,255,255,.18);color:#fff}.flow-note{font-size:.72rem;color:#bdb0c2}
    .toast{position:absolute;z-index:5;left:6%;right:6%;top:5%;padding:13px 16px;border-left:4px solid #60edf0;background:rgba(10,4,20,.96);box-shadow:0 15px 35px rgba(0,0,0,.45);font-size:clamp(.73rem,2vw,.93rem);font-weight:700;opacity:0;visibility:hidden;transform:translateY(-180%);transition:transform .45s ease,opacity .2s ease}.toast.show{opacity:1;visibility:visible;transform:translateY(0)}
    @media(max-height:760px){.eyebrow{margin:4% 0 1%}.sub{margin:3% auto}.cover{width:30%;max-width:135px}.history{padding-top:2%}.gift-row{padding:4px 0}}
  </style>
</head>
<body>
  <article class="poster" aria-label="Vertical GTA VI gift announcement">
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="content">
      <div class="top">DIGITAL GIFT DEMO <span class="spark">✦</span> GTA VI</div>
      <div class="eyebrow">A GIFT FOR YOU</div>
      <h1 class="title">GTA<span>VI</span></h1>
      <p class="sub">Choose a username and send the gift.</p>
      <form id="giftForm"><div class="recipient-row"><input id="username" aria-label="Recipient username" maxlength="32" required placeholder="Recipient username"><button type="submit">SEND</button></div><div class="platforms" aria-label="Gift platform"><button class="platform selected" type="button" data-platform="Xbox" aria-pressed="true">XBOX</button><button class="platform" type="button" data-platform="PlayStation 5" aria-pressed="false">PLAYSTATION 5</button></div></form>
      <div class="cover"><img src="https://www.rockstargames.com/VI/_next/static/media/Official_Cover_Art_landscape.12.uu2irr.2_a.jpg?akim=1&imdensity=1&imwidth=3840" alt="Grand Theft Auto VI cover artwork"></div>
      <section class="history" aria-labelledby="historyTitle"><div class="history-head"><h2 id="historyTitle">GIFT HISTORY</h2><small id="giftCount">1 gift sent</small></div><div id="historyList"><div class="gift-row"><span>GTA VI (Xbox) → @VicePlayer_06<small>GIFT-6V-8K42 · Jul 13, 2026, 10:30 AM</small></span><b>● PENDING<em>Platform verification → Ready on release day</em></b></div></div></section>
    </div>
    <section class="flow-modal" id="flowModal" aria-live="polite" aria-label="Gift confirmation"><div class="flow-card" id="flowCard"></div></section>
  </article>
  <script>
    const form=document.getElementById('giftForm'), username=document.getElementById('username'), historyList=document.getElementById('historyList'), giftCount=document.getElementById('giftCount'), toast=document.getElementById('toast'), platforms=document.querySelectorAll('.platform'), flowModal=document.getElementById('flowModal'), flowCard=document.getElementById('flowCard');
    let selectedPlatform='Xbox', pendingGift=null;
    const createReference=()=>`GIFT-6V-${Math.random().toString(36).slice(2,6).toUpperCase()}`;
    const displayDate=()=>new Intl.DateTimeFormat('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}).format(new Date());
    const escapeHtml=value=>value.replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    platforms.forEach(button=>button.addEventListener('click',()=>{selectedPlatform=button.dataset.platform;platforms.forEach(item=>{const selected=item===button;item.classList.toggle('selected',selected);item.setAttribute('aria-pressed',selected);});}));
    function closeFlow(){flowModal.classList.remove('show');}
    function openSummary(){const name=username.value.trim();if(!name)return;const recipient=name.startsWith('@')?name:'@'+name;pendingGift={recipient,platform:selectedPlatform,reference:createReference(),date:displayDate()};flowCard.innerHTML=`<h2>CONFIRM GIFT</h2><p>Please review the gift details.</p><div class="summary"><div><span>Game</span><b>GTA VI</b></div><div><span>Recipient</span><b>${escapeHtml(recipient)}</b></div><div><span>Platform</span><b>${escapeHtml(selectedPlatform)}</b></div><div><span>Reference</span><b>${pendingGift.reference}</b></div></div><div class="flow-actions"><button class="secondary" type="button" id="editGift">EDIT</button><button type="button" id="confirmGift">CONFIRM</button></div><p class="flow-note">Demo only — no platform delivery is processed.</p>`;flowModal.classList.add('show');document.getElementById('editGift').addEventListener('click',closeFlow);document.getElementById('confirmGift').addEventListener('click',sendGift);}
    function sendGift(){const gift=pendingGift;if(!gift)return;const row=document.createElement('div');row.className='gift-row';row.innerHTML=`<span>GTA VI (${escapeHtml(gift.platform)}) → ${escapeHtml(gift.recipient)}<small>${gift.reference} · ${gift.date}</small></span><b>● PENDING<em>Platform verification → Ready on release day</em></b>`;historyList.append(row);historyList.scrollTop=historyList.scrollHeight;const total=historyList.children.length;giftCount.textContent=total+' gift'+(total===1?' sent':'s sent');toast.textContent='Gift recorded for '+gift.recipient+' — status: pending.';toast.classList.add('show');clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>toast.classList.remove('show'),3200);flowCard.innerHTML=`<h2>GIFT CONFIRMED</h2><p>GTA VI is recorded for <b>${escapeHtml(gift.recipient)}</b>.</p><div class="summary"><div><span>Reference</span><b>${gift.reference}</b></div><div><span>Status</span><b>Pending</b></div><div><span>Next step</span><b>Platform verification</b></div></div><button type="button" id="anotherGift">SEND ANOTHER GIFT</button><p class="flow-note">Demo only — no platform delivery is processed.</p>`;document.getElementById('anotherGift').addEventListener('click',()=>{closeFlow();form.reset();username.focus();pendingGift=null;});}
    form.addEventListener('submit',event=>{event.preventDefault();openSummary();});
  </script>
</body>
</html>
